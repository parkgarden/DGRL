name: dgrl-h
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - numpy=1.24.1
  - pandas=2.0.3
  - openpyxl=3.1.5
  - tensorboard=2.10.1
  - pip:
      - torch==2.4.1+cu121 --index-url https://download.pytorch.org/whl/cu121
      - torch-geometric==2.6.1
      - torch-scatter==2.1.2+pt24cu121 --find-links https://data.pyg.org/whl/torch-2.4.1+cu121.html
      - torch-sparse==0.6.18+pt24cu121 --find-links https://data.pyg.org/whl/torch-2.4.1+cu121.html
      - torch-cluster==1.6.3+pt24cu121 --find-links https://data.pyg.org/whl/torch-2.4.1+cu121.html
